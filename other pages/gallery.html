<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | AAAlam Learning Community</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="gallery.css">
</head>

<body>

<header>
  <nav class="navbar">
    <h2 class="logo">ஆLAM</h2>
    <ul class="nav-links">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/other pages/about.html">About</a></li>
      <li><a href="/other pages/gallery.html" class="active">Gallery</a></li>
      <li><a href="/other pages/contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <h1>Our Gallery</h1>
  <p>Explore learning moments at AAAlam</p>
</section>

<section class="gallery-section">

  <!-- FILTER -->
  <div class="filter-buttons">
    <button class="active" onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('workshops')">Workshops</button>
    <button onclick="filterSelection('steam')">STEAM</button>
    <button onclick="filterSelection('events')">Events</button>
    <button onclick="filterSelection('camps')">Camps</button>
  </div>

  <!-- BENTO GRID -->
  <div class="gallery-grid">

    <div class="gallery-item workshops tall">
      <img src="/images/workshop 1.jpeg">
    </div>

    <div class="gallery-item steam wide">
      <img src="/images/camp 1.webp">
    </div>

    <div class="gallery-item events">
      <img src="/images/event 1.webp">
    </div>

    <div class="gallery-item camps tall">
      <img src="/images//camp 2.webp">
    </div>

    <div class="gallery-item steam">
      <img src="/images/stem 1.jpeg">
    </div>

    <div class="gallery-item workshops wide">
      <img src="/images/stem 2.png">
    </div>

    <div class="gallery-item events">
      <img src="/images/event2.webp">
    </div>

    <div class="gallery-item camps">
      <img src="/images/camp2.jpeg">
    </div>

  </div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
// FILTER
function filterSelection(category) {
  const items = document.querySelectorAll(".gallery-item");

  items.forEach(item => {
    if (category === "all" || item.classList.contains(category)) {
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
  });
}

// ACTIVE BUTTON
document.querySelectorAll(".filter-buttons button").forEach(btn => {
  btn.addEventListener("click", function () {
    document.querySelector(".active").classList.remove("active");
    this.classList.add("active");
  });
});

// LIGHTBOX
const images = document.querySelectorAll(".gallery-item img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.onclick = () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  };
});

document.getElementById("close").onclick = () => {
  lightbox.style.display = "none";
};
</script>

</body>
</html>
